<!DOCTYPE html>
<html>
<head>
<title>Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 340px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Title */
h2 {
    margin-bottom: 20px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

/* Verify button */
.verify-btn {
    background: #4285f4;
    color: white;
}

/* Back button */
.back-btn {
    background: #e0e0e0;
}

/* Disabled state */
button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
</style>

</head>

<body>

<div class="box">
    <h2>🔐 Human Verification</h2>

    <button class="verify-btn" id="verifyBtn" onclick="verify()">
        I'm not a robot
    </button>

    <button class="back-btn" onclick="back()">
        ⬅ Back to Bot
    </button>

    <div class="footer">
        Nexa Security System
    </div>
</div>

<script>
function verify() {
    const btn = document.getElementById("verifyBtn");
    btn.innerText = "Verifying...";
    btn.disabled = true;

    const params = new URLSearchParams(window.location.search);
    const user_id = params.get("user_id");
    const token = params.get("token");

    if (!user_id || !token) {
        alert("Invalid request");
        btn.innerText = "I'm not a robot";
        btn.disabled = false;
        return;
    }

    fetch(`/verify?user_id=${user_id}&token=${token}`)
    .then(res => res.json())
    .then(data => {
        if (data.status === "verified") {
            btn.innerText = "Verified ✅";
            window.location.href = `https://t.me/{{ bot }}?start=${user_id}`;
        } else {
            alert(data.status);
            btn.innerText = "I'm not a robot";
            btn.disabled = false;
        }
    })
    .catch(() => {
        alert("Server error");
        btn.innerText = "I'm not a robot";
        btn.disabled = false;
    });
}

function back() {
    const params = new URLSearchParams(window.location.search);
    const user_id = params.get("user_id");

    window.location.href = `https://t.me/{{ bot }}?start=${user_id}`;
}
</script>

</body>
</html>
