<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v3"></script>

  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      color: white;
      margin: 0;
    }

    .captcha-box {
      background: white;
      color: black;
      padding: 15px 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      width: 300px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .captcha-box:hover {
      transform: scale(1.02);
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #555;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .checked {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .right {
      margin-left: auto;
      font-size: 12px;
      color: #555;
    }

    .done {
      display: none;
      text-align: center;
    }

    .done button {
      margin-top: 15px;
      padding: 12px 25px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .done button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

<div id="box" class="captcha-box" onclick="verify()">
  <div class="checkbox" id="check"></div>
  <div>I'm not a robot</div>
  <div class="right">reCAPTCHA</div>
</div>

<div id="done" class="done">
  <h3>✅ Verification Successful</h3>
  <button onclick="goBot()">🚀 Continue to Bot</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

async function verify() {
    const user = tg.initDataUnsafe.user;

    if (!user) {
        alert("Open inside Telegram!");
        return;
    }

    const check = document.getElementById("check");
    check.classList.add("checked");
    check.innerHTML = "✔";

    const fp = await FingerprintJS.load();
    const result = await fp.get();
    const device_id = result.visitorId;

    try {
        const res = await fetch("/api/server", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: user.id,
                device_id: device_id
            })
        });

        const data = await res.json();

        if (data.status === "ok" || data.status === "already") {
            tg.sendData("verified");

            setTimeout(() => {
                document.getElementById("box").style.display = "none";
                document.getElementById("done").style.display = "block";
            }, 800);

        } else if (data.status === "blocked_device") {
            alert("❌ Device already used!");
        } else if (data.status === "blocked_ip") {
            alert("❌ Too many accounts!");
        } else {
            alert("❌ Verification failed!");
        }

    } catch (e) {
        alert("❌ Server error!");
    }
}

function goBot() {
    window.location.href = "https://t.me/Tikustarbot?start=verified";
}
</script>

</body>
</html>
