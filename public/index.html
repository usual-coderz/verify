<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://openfpcdn.io/fingerprintjs/v3"></script>

  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      color: white;
    }

    .captcha-box {
      background: white;
      color: black;
      padding: 15px 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      width: 300px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #555;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checked {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .right {
      margin-left: auto;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="captcha-box" onclick="verify()" id="box">
  <div class="checkbox" id="check"></div>
  <div>I'm not a robot</div>
  <div class="right">reCAPTCHA</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

async function verify() {
    const user = tg.initDataUnsafe.user;

    if (!user) {
        alert("Open inside Telegram!");
        return;
    }

    const check = document.getElementById("check");
    check.classList.add("checked");
    check.innerHTML = "✔";

    const fp = await FingerprintJS.load();
    const result = await fp.get();

    const device_id = result.visitorId;

    const res = await fetch("/api/server", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: user.id,
            device_id: device_id
        })
    });

    const data = await res.json();

    if (data.status === "ok" || data.status === "already") {
        setTimeout(() => {
            tg.sendData("verified");
            tg.close();
        }, 800);
    } else if (data.status === "blocked_device") {
        alert("❌ Device already used!");
    } else if (data.status === "blocked_ip") {
        alert("❌ Too many accounts!");
    } else {
        alert("❌ Verification failed!");
    }
}
</script>

</body>
</html>
